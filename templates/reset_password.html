<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - Scientral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/auth.css') }}">
</head>
<body class="login-page-body">
    <div class="login-form-container">
        <div class="login-header">
            <div class="login-icon-wrapper">
                <i class="bi bi-key-fill fs-3 text-primary"></i>
            </div>
            <h2>Nouveau mot de passe</h2>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} shadow-sm border-0 mb-4 py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="login-form" id="resetForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="password" id="password" class="form-control" placeholder="Nouveau mot de passe" required minlength="12" autofocus>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="confirm_password" id="password_confirm" class="form-control" placeholder="Confirmer le mot de passe" required>
            </div>
            <!-- Barre de force -->
            <div class="progress mb-2" style="height: 4px;">
                <div class="progress-bar" id="strengthBar" style="width:0%; transition: all 0.3s;"></div>
            </div>
            <!-- Indicateurs -->
            <div class="password-requirements mb-4">
                <div class="row g-1 text-center">
                    <div class="col-4 requirement-item" id="req-length"><i class="bi bi-circle"></i> 12+ car.</div>
                    <div class="col-4 requirement-item" id="req-uppercase"><i class="bi bi-circle"></i> Majuscule</div>
                    <div class="col-4 requirement-item" id="req-lowercase"><i class="bi bi-circle"></i> Minuscule</div>
                    <div class="col-4 requirement-item" id="req-number"><i class="bi bi-circle"></i> Chiffre</div>
                    <div class="col-4 requirement-item" id="req-special"><i class="bi bi-circle"></i> Spécial</div>
                    <div class="col-4 requirement-item" id="req-match"><i class="bi bi-circle"></i> Identiques</div>
                </div>
            </div>
            <button type="submit" class="btn-login w-100" id="submitBtn">
                <i class="bi bi-check-circle me-2"></i>Enregistrer le mot de passe
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">
                <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
            </a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetForm');
            const password = document.getElementById('password');
            const passwordConfirm = document.getElementById('password_confirm');
            const strengthBar = document.getElementById('strengthBar');
            function checkPassword() {
                const val = password.value;
                const valConf = passwordConfirm.value;
                let strength = 0;
                const checks = {
                    'req-length': val.length >= 12,
                    'req-uppercase': /[A-Z]/.test(val),
                    'req-lowercase': /[a-z]/.test(val),
                    'req-number': /[0-9]/.test(val),
                    'req-special': /[^A-Za-z0-9]/.test(val),
                    'req-match': val.length > 0 && val === valConf
                };
                for (const [id, met] of Object.entries(checks)) {
                    const el = document.getElementById(id);
                    const icon = el.querySelector('i');
                    if (met) {
                        el.classList.add('met');
                        icon.className = 'bi bi-check-circle-fill';
                        if(id !== 'req-match') strength += 20;
                    } else {
                        el.classList.remove('met');
                        icon.className = 'bi bi-circle';
                    }
                }
                strengthBar.style.width = strength + '%';
                if (strength <= 40) strengthBar.style.backgroundColor = '#ef4444';
                else if (strength <= 80) strengthBar.style.backgroundColor = '#f59e0b';
                else strengthBar.style.backgroundColor = '#10b981';
            }
            password.addEventListener('input', checkPassword);
            passwordConfirm.addEventListener('input', checkPassword);
            form.addEventListener('submit', function(e) {
                if (!form.checkValidity() || password.value !== passwordConfirm.value) {
                    e.preventDefault();
                    e.stopPropagation();
                    form.classList.add('was-validated');
                } else {
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Enregistrement...';
                }
            });
        });
    </script>
</body>
</html>
